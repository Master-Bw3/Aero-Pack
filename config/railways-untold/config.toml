#Railways Untold Configuration
[track_clearing]
	#Number of blocks to clear horizontally on each side of the track.
	# Default: 3
	# Range: 1 ~ 16
	horizontalExpansion = 3
	#
	#Number of blocks to clear vertically above the track.
	# Default: 6
	# Range: 2 ~ 32
	verticalExpansion = 6

#World Generation Settings
#Controls which world types allow track generation
[world_generation]
	#Comma-separated list of chunk generator types where track generation is allowed.
	#Uses the registry name of the chunk generator (e.g. 'minecraft:noise', 'minecraft:flat').
	#You can omit the namespace for vanilla types (e.g. 'noise' matches 'minecraft:noise').
	#'default' and 'noise' are treated as synonyms (both match the standard overworld).
	#Modded generators can be added by their full ID (e.g. 'bigglobe:scripted').
	#Set to an empty string to disable generation in all world types.
	generateInWorldTypes = "minecraft:noise,minecraft:flat"

#Feature Toggles
[features]
	#Whether to place a starting train at world generation.
	#If false, only the track network will be generated.
	startingTrain = true
	#
	#Whether track branches (junctions) are enabled.
	#If false, tracks will only generate as a single continuous line.
	branchesEnabled = true
	#
	#Whether branches can create additional branches (recursive branching).
	#If false, only the main track lines can create branches.
	#Has no effect if branchesEnabled is false.
	recursiveBranchingEnabled = true
	#
	#Maximum depth for recursive branching.
	#1 = one level of branches, 2 = branches can branch once, 3 = two levels of recursive branches, etc.
	#Setting to 0 means unlimited branch depth which could affect performance.
	#Only applies when recursiveBranchingEnabled is true.
	# Default: 3
	# Range: 0 ~ 10
	maxBranchDepth = 3
	#
	#Maximum number of simultaneously active track heads (including main tracks and all branches).
	#Limits how many track lines can be generating at once.
	#Setting to 0 means unlimited heads which could affect performance.
	# Default: 15
	# Range: 0 ~ 100
	maxActiveHeads = 15
	#
	#Minimum distance in blocks between consecutive branches from the same track head.
	#After spawning a branch, the parent head must travel this distance before branching again.
	# Default: 150
	# Range: 50 ~ 1000
	minBranchSpacing = 150
	#
	#Comma-separated structure tags to target for station placement.
	#Each entry is a structure tag name (e.g., 'minecraft:village').
	#Tracks will path toward these structures and place stations.
	#Custom tags from datapacks are supported.
	#Set to an empty string to disable structure targeting entirely.
	structureTargetTags = "minecraft:village"
	#
	#Whether tracks should avoid obstacles by turning.
	#When enabled, tracks will curve around structures, terrain obstacles, and other hazards.
	#When disabled, tracks will go straight through all terrain (tunneling through mountains,
	#descending into ravines) without ever turning.
	allAvoidance = true
	#
	#Comma-separated list of structures to ignore during avoidance.
	#Tracks will pass straight through blacklisted structures instead of routing around them.
	#Supports full structure set names (e.g. 'wythers:baobab_savanna') or entire
	#namespaces with a trailing colon (e.g. 'wythers:' ignores all structures from that mod).
	#Useful for mods that register decorative features (trees, fossils) as structures,
	#which would otherwise cause tracks to avoid entire biomes.
	#Example: 'wythers:,supplementaries:' to ignore all structures from both mods.
	structureAvoidanceBlacklist = "wythers:"
	#
	#Comma-separated list of structure sets known to generate underground or underwater.
	#These structures are skipped during avoidance because they never conflict with surface tracks.
	#Supports full structure set names (e.g. 'minecraft:shipwrecks') or entire
	#namespaces with a trailing colon (e.g. 'terralith:' skips all from that mod).
	#The BURY terrain adaptation check handles most underground structures automatically;
	#this list catches structures that use NONE adaptation but still generate underground.
	structureUndergroundList = "minecraft:buried_treasures,minecraft:mineshafts,minecraft:ancient_cities,minecraft:strongholds,minecraft:trial_chambers,minecraft:ocean_ruins,minecraft:ocean_monuments,minecraft:shipwrecks,minecraft:ruined_portals,terralith:underground,terralith:underground_dungeon"
	#
	#Distance in blocks that a player must be within for track placement to occur.
	#When a player is closer than this distance to a track head, chunks ahead will be loaded
	#allowing for longer track segments. Higher values create longer segments but may slow generation.
	#Lower values make tracks generate faster but with shorter segments.
	# Default: 96
	# Range: 8 ~ 128
	playerTriggerDistance = 96
	#
	#Whether workstation blocks (crafting table, stonecutter, anvil, etc.) can be used on trains.
	#When enabled, players can open workstation GUIs by interacting with these blocks on moving contraptions.
	contraptionWorkstations = false
	#
	#Whether players can sleep in beds placed on trains.
	#When enabled, players can use beds on moving contraptions to sleep and set their respawn point.
	contraptionBedSleeping = false
	#
	#Enable side-by-side dual track mode.
	#Two parallel tracks with opposite travel directions.
	#Separation = horizontalExpansion * 2 (minimum 5 blocks).
	sideBySideTracks = false
	#
	#Enable rail sidings (passing loops).
	#When enabled, long straight sections of track will occasionally
	#generate a parallel siding that diverges and reconnects.
	sidingsEnabled = true
	#
	#Minimum number of consecutive straight segments before a siding can be placed.
	#Each segment is approximately 16 blocks long.
	# Default: 6
	# Range: 3 ~ 100
	sidingMinStraightSegments = 6
	#
	#Enable solid collision for Create train tracks.
	#When enabled, tracks have full collision shapes so players don't fall through.
	#Applies to both straight tracks and curved (bezier) track segments.
	solidTrackCollision = true

#Track Material Settings
#Configure which track material and gauge to use.
#Non-default values require Steam 'n' Rails (Railway) mod.
[track_material]
	#Base track material name.
	#Values: andesite (Create default), oak, birch, spruce, dark_oak, jungle,
	#acacia, crimson, warped, blackstone, mangrove, cherry, bamboo, stripped_bamboo, ender,
	#tieless, phantom, monorail.
	#Non-default values require Steam 'n' Rails.
	#Note: phantom tracks are invisible. tieless tracks have no cross-ties.
	#Wide/narrow gauge variants are not available for phantom or monorail.
	material = "andesite"
	#
	#Track width/gauge.
	#Values: standard, wide, narrow.
	#Non-standard values require Steam 'n' Rails.
	#Note: phantom tracks only support standard gauge.
	gauge = "standard"

#Block Settings
[blocks]
	#Block used for tunnel walls and facades.
	#Supports block state properties in brackets (e.g. 'minecraft:mushroom_stem[up=false,down=false]').
	#Example: 'create:small_scorchia_bricks', 'minecraft:stone_bricks'
	tunnelFacadeBlock = "create:small_scorchia_bricks"
	#
	#Block used for support pillars under elevated tracks.
	#Supports block state properties in brackets (e.g. 'minecraft:oak_log[axis=y]').
	#Example: 'create:cut_deepslate_bricks', 'minecraft:deepslate_bricks'
	supportPillarBlock = "create:cut_deepslate_bricks"
	#
	#Whether to fill the gap under tracks that are 1-3 blocks above ground.
	#Places fill blocks from ground level up to the track,
	#covering the zone below bridge decking threshold.
	#3 blocks wide at the top two layers, 5 blocks wide below that.
	terrainFillEnabled = true
	#
	#Block used for the top two layers of terrain fill (at trackY-1 and trackY-2).
	#Gravity-affected blocks like gravel are supported (placed bottom-up).
	#Supports block state properties in brackets.
	#Example: 'minecraft:gravel', 'minecraft:coarse_dirt'
	terrainFillBlock = "minecraft:gravel"
	#
	#Block used for terrain fill below the top two layers.
	#This forms the bulk of the fill down to ground level.
	#Supports block state properties in brackets.
	#Example: 'minecraft:cobblestone', 'minecraft:stone'
	terrainFillBaseBlock = "minecraft:cobblestone"
	#
	#Block used for station foundations when a station is placed above air.
	#Fills downward from the bottom of the station until solid ground is reached.
	#Supports block state properties in brackets.
	#Example: 'minecraft:cobblestone', 'minecraft:stone_bricks'
	stationFoundationBlock = "minecraft:cobblestone"

#Support Pillar Spacing
#Controls when and how often support pillars are placed under tracks
[pillars]
	#Minimum height above ground before first pillar is placed.
	#Tracks lower than this won't get support pillars.
	# Default: 5
	# Range: 1 ~ 64
	pillarFirstThreshold = 5
	#
	#Distance in blocks between support pillars.
	# Default: 9
	# Range: 3 ~ 32
	pillarInterval = 9
	#
	#Minimum height above ground to use bridge decking instead of thin pillars.
	#When track is this many blocks above ground, bridge decking and schematic
	#pillars are used instead of basic support columns.
	#Set to 0 to only use bridge decking over water (original behavior).
	# Default: 4
	# Range: 0 ~ 32
	bridgeElevationThreshold = 4

#Terrain Detection
#Controls how the track generator detects and responds to terrain features
[terrain]
	#Minimum elevation change (in blocks) to classify terrain as a cliff.
	#When terrain drops or rises by this amount, tracks will curve around instead of going straight.
	#Lower values = more sensitive cliff detection (curves more often).
	#Higher values = less sensitive (tracks go down over steeper terrain more often).
	# Default: 10
	# Range: 2 ~ 15
	cliffThreshold = 10
	#
	#Whether tracks should curve away from terrain features like cliffs and ravines.
	#When true, tracks will turn to avoid steep drops and cliff edges.
	#When false, tracks will prefer going straight through terrain using bridges,
	#tunnels, and steep slopes instead of curving around.
	#This is separate from allAvoidance (in features) which controls structure avoidance.
	terrainCurveAvoidance = true
	#
	#Allow curves to change elevation while turning (banking curves).
	#When false, curves are always flat and elevation changes happen on straight segments.
	#When true, curves can slope up/down while turning, creating a roller coaster effect.
	bankingCurves = false
	#
	#Whether tracks can make gentle lateral shifts (slight sideways beziers).
	#When enabled, tracks can shift a few blocks sideways without using 90-degree curves.
	#Creates more natural-looking paths when targets are slightly off-axis.
	laterals = true
	#
	#Maximum lateral offset (in blocks) for direct bezier shifts.
	#Targets within this lateral distance can use gentle beziers instead of curves.
	#Higher values = more gradual curves, but trains may struggle with large shifts.
	# Default: 10
	# Range: 2 ~ 20
	lateralOffset = 10
	#
	#Rise component of the maximum slope ratio (rise:run).
	#Combined with slopeRun to determine max track steepness.
	#Example: rise=1, run=2 means max slope of 1/2 (0.5).
	# Default: 1
	# Range: 1 ~ 5
	slopeRise = 1
	#
	#Run component of the maximum slope ratio (rise:run).
	#Combined with slopeRise to determine max track steepness.
	#Example: rise=1, run=2 means max slope of 1/2 (0.5).
	# Default: 4
	# Range: 1 ~ 20
	slopeRun = 4
	#
	#Minimum curve radius in blocks.
	#Smaller values allow tighter turns but may cause train navigation issues.
	# Default: 15
	# Range: 10 ~ 50
	minCurveRadius = 15
	#
	#Maximum curve radius in blocks.
	#Larger values create wider, smoother turns.
	# Default: 25
	# Range: 10 ~ 100
	maxCurveRadius = 25
	#
	#Minimum height above water level for bridge tracks over oceans and rivers.
	#Set to 0 to disable water bridging.
	# Default: 5
	# Range: 0 ~ 20
	bridgeWaterDistance = 5

#Tunnel Settings
#Controls tunnel decoration like torch placement
[tunnels]
	#Distance in blocks between light placements in tunnels.
	#Lights are placed on both walls at this interval.
	# Default: 14
	# Range: 2 ~ 64
	lightSpacing = 14
	#
	#Block used for tunnel lighting.
	#Supports block state properties in bracket syntax for blocks that need specific states.
	#Example: 'minecraft:wall_torch', 'minecraft:glowstone',
	#  'minecraft:redstone_lamp[lit=true]', 'minecraft:campfire[lit=true]'
	lightingBlock = "minecraft:wall_torch"
	#
	#How the lighting block attaches to the tunnel.
	#1 = Wall hanging (placed in air next to wall, like a torch)
	#2 = Embedded in wall (replaces wall block, like glowstone)
	# Default: 1
	# Range: 1 ~ 2
	lightingAttachment = 1

#Debug Settings
[debug]
	#Enable verbose debug logging for track placement and chunk loading.
	#Useful for diagnosing issues with track heads stalling or not resuming.
	#Warning: produces a lot of log output. Only enable when troubleshooting.
	verboseLogging = false

#Custom NBT Settings
#Load custom train or station schematics from config/railways-untold/ folder.
#Train NBT files go in: config/railways-untold/train/
#Station NBT files go in: config/railways-untold/station/
[custom_nbt]
	#Whether to place a station at the starting track area with the starting train.
	#The station schematic (default or custom) will be placed at the train's starting position.
	#Has no effect if startingTrain is disabled.
	stationAtStart = true
	#
	#Enable loading a custom train from the train folder.
	#If the custom train fails to load, the default train will be used.
	customTrain = false
	#
	#Filename of the custom train NBT file.
	#File should be placed in: config/railways-untold/train/
	#Example: 'my_train.nbt' or 'my_train' (.nbt extension optional)
	trainNbt = ""
	#
	#Override which direction the front of your custom train faces in the schematic.
	#Only applies when customTrain is enabled.
	#auto = detect using whistle > smokestack > controls.
	#north/south/east/west = the front of the train faces this direction in the schematic.
	customTrainFrontFacing = "auto"
	#
	#Enable loading a custom station from the station folder.
	#If the custom station fails to load, the default station will be used.
	customStation = false
	#
	#Filename of the custom station NBT file.
	#File should be placed in: config/railways-untold/station/
	#Example: 'my_station.nbt' or 'my_station' (.nbt extension optional)
	stationNbt = ""

#Event Settings
#Place custom .nbt schematics randomly along generated tracks.
#All .nbt files in config/railways-untold/events/ are loaded and validated at startup.
#Valid schematics must have straight edge-to-edge track (same rules as stations).
[events]
	#Enable placing custom event schematics along tracks.
	#Requires valid .nbt files in config/railways-untold/events/
	customEvents = false
	#
	#Minimum distance in blocks between events.
	#After placing an event, the track must travel this far before another can appear.
	# Default: 500
	# Range: 100 ~ 5000
	eventSeparationMinDistance = 500
	#
	#Chance (percent) of placing an event once minimum distance is met.
	#Checked each track segment after the minimum distance requirement.
	# Default: 15
	# Range: 1 ~ 100
	eventChance = 15
